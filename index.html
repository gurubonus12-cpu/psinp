<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MemeSignal ZERO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #030303; --card: #0d0d0d; --accent: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        /* HW Acceleration for Smooth Scrolling */
        .scroll-container { height: calc(100vh - 80px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border: 1px solid #1a1a1a; contain: content; }
        .spike-anim { border: 2px solid #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 12px; z-index: 100; display: none; }
    </style>
</head>
<body class="fixed inset-0 overflow-hidden">
    <div id="copyToast" class="toast">COPIED</div>

    <nav class="p-4 bg-[#0d0d0d] border-b border-[#1a1a1a] flex justify-between items-center h-20">
        <div>
            <h1 class="text-xl font-black text-blue-500 tracking-tighter italic">ZERO-LAG RADAR</h1>
            <div id="stats" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest flex gap-2">
                <span>SOLANA</span> • <span id="poolCount">0 POOLS</span>
            </div>
        </div>
        <button id="powerBtn" class="bg-blue-600 px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-900/30">Connect</button>
    </nav>

    <div id="feed" class="scroll-container p-3 space-y-4">
        <div class="flex flex-col items-center justify-center h-full opacity-20">
            <p class="text-sm">Initializing High-Speed Feed...</p>
        </div>
    </div>

    <audio id="snd" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <script>
        const feed = document.getElementById('feed');
        const powerBtn = document.getElementById('powerBtn');
        const snd = document.getElementById('snd');
        const toast = document.getElementById('copyToast');
        
        // Memory-efficient storage
        const cache = new Map();
        let isActive = false;

        powerBtn.onclick = () => {
            isActive = true;
            snd.play().then(() => snd.pause());
            powerBtn.innerText = "📡 LIVE";
            powerBtn.className = "bg-green-600 px-6 py-2 rounded-xl font-black text-xs uppercase";
            startEngine();
        };

        async function startEngine() {
            if(!isActive) return;
            try {
                const res = await fetch('https://api.dexscreener.com/latest/dex/tokens/solana');
                const data = await res.json();
                if (!data?.pairs) { setTimeout(startEngine, 5000); return; }

                // 1. Batch Filtering (No lag)
                const signals = data.pairs.filter(p => 
                    p.liquidity?.usd > 20000 && 
                    p.txns.m5.buys > 10 && 
                    p.txns.m5.sells > 0 // Anti-Honeypot
                ).slice(0, 20);

                document.getElementById('poolCount').innerText = `${signals.length} ACTIVE`;

                // 2. Fragment Batching (Prevents UI freezing)
                const fragment = document.createDocumentFragment();
                let hasNew = false;

                signals.forEach(token => {
                    const addr = token.baseToken.address;
                    if (!cache.has(addr)) {
                        hasNew = true;
                        const card = createCard(token);
                        cache.set(addr, card);
                        fragment.appendChild(card);
                    } else {
                        updateCard(token); // Update price only
                    }
                });

                if (hasNew) {
                    if (cache.size > 20) feed.innerHTML = ''; // Hard reset if feed gets too long to prevent lag
                    feed.prepend(fragment);
                    snd.currentTime = 0;
                    snd.play().catch(()=>{});
                }

                // Memory Cleanup (Keep only last 50 tokens in memory)
                if (cache.size > 50) {
                    const keys = Array.from(cache.keys());
                    for(let i=0; i<10; i++) cache.delete(keys[i]);
                }

                setTimeout(startEngine, 7000); // 7s Loop
            } catch (e) {
                setTimeout(startEngine, 10000);
            }
        }

        function createCard(token) {
            const el = document.createElement('div');
            el.id = `c-${token.baseToken.address}`;
            const price = parseFloat(token.priceUsd);
            const m5 = token.priceChange.m5;
            const isSpike = m5 > 10;
            
            el.className = `card p-4 rounded-2xl ${isSpike ? 'spike-anim' : ''}`;
            el.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <div class="flex gap-2 mb-2">
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase">Smart Money</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-green-500/10 text-green-400 border border-green-500/20 uppercase">No Rug</span>
                        </div>
                        <h2 class="text-lg font-black tracking-tighter">${token.baseToken.symbol}/SOL</h2>
                    </div>
                    <div class="text-right">
                        <p id="p-${token.baseToken.address}" class="text-green-400 font-mono font-bold">$${price.toFixed(8)}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Cap: $${Math.round(token.fdv).toLocaleString()}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-4 bg-black/40 p-2 rounded-xl text-center">
                    <div><p class="text-[8px] text-gray-500 font-bold uppercase">Stop (-15%)</p><p class="text-red-400 font-mono text-[10px] font-bold">$${(price*0.85).toFixed(8)}</p></div>
                    <div><p class="text-[8px] text-gray-500 font-bold uppercase">Target (+50%)</p><p class="text-green-400 font-mono text-[10px] font-bold">$${(price*1.5).toFixed(8)}</p></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="copy('${token.baseToken.address}')" class="flex-1 bg-[#1a1a1a] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:bg-blue-600">Copy CA</button>
                    <a href="https://t.me/solana_trojanbot?start=r-user-${token.baseToken.address}" target="_blank" class="flex-[1.5] bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase text-center shadow-lg">Quick Buy</a>
                </div>
            `;
            return el;
        }

        function updateCard(token) {
            const pEl = document.getElementById(`p-${token.baseToken.address}`);
            if (pEl) pEl.innerText = `$${parseFloat(token.priceUsd).toFixed(8)}`;
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            toast.style.display = 'block';
            if (navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => { toast.style.display = 'none'; }, 1000);
        }
    </script>
</body>
</html>
